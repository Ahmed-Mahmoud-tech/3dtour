server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Panorama / video uploads go through this proxy (up to ~500MB), so lift
    # nginx's default 1MB body cap and stream the request straight through.
    client_max_body_size 0;
    proxy_request_buffering off;

    # API + uploaded media → the server container on the docker network.
    location /api/ {
        proxy_pass http://server:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://server:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — every other route resolves to the React app.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
