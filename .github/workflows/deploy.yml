# Deploy — on every push to master:
#   1. build the three images and push them to GHCR
#      (ghcr.io/<owner>/<repo>/{server,client,admin}, tagged :latest + :<sha>)
#   2. rsync docker-compose.prod.yml + ops/ to the VPS and roll the stack over
#      SSH (ops/deploy/remote-deploy.sh), gated on an API health check.
#
# Required repo secrets for step 2 (until they exist, images are still pushed
# and the deploy step is skipped with a warning):
#   DEPLOY_HOST      VPS IP / hostname
#   DEPLOY_USER      SSH user
#   DEPLOY_SSH_KEY   private key (openssh format) authorized on the VPS
# Optional:
#   DEPLOY_PORT      SSH port (default 22)
#   DEPLOY_PATH      stack dir on the VPS (default ~/photovideo360)
#
# One-time VPS setup lives in OPS.md (install docker, create $DEPLOY_PATH/.env
# with JWT_SECRET etc., free the ports).

name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing image tag to deploy (skips build). Empty = build current commit."
        required: false
        default: ""

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-push:
    # Skipped when dispatching an existing tag (rollback).
    if: github.event_name == 'push' || inputs.tag == ''
    name: push ${{ matrix.name }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: server
            context: .
            dockerfile: server/Dockerfile
          - name: client
            context: client
            dockerfile: client/Dockerfile
          - name: admin
            context: admin
            dockerfile: admin/Dockerfile
    steps:
      - uses: actions/checkout@v4

      # GHCR requires lowercase image names; the GitHub owner is not lowercase.
      - name: Derive image prefix
        id: img
        run: echo "prefix=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.img.outputs.prefix }}/${{ matrix.name }}:latest
            ${{ steps.img.outputs.prefix }}/${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  deploy:
    needs: build-push
    # Run even when build-push was skipped (tag rollback), but not when it failed.
    if: always() && needs.build-push.result != 'failure' && needs.build-push.result != 'cancelled'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check deploy secrets
        id: guard
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          if [ -z "$DEPLOY_HOST" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::DEPLOY_HOST / DEPLOY_USER / DEPLOY_SSH_KEY secrets are not set — images were pushed to GHCR, server deploy skipped."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up SSH
        if: steps.guard.outputs.configured == 'true'
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync compose + ops files to the VPS
        if: steps.guard.outputs.configured == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          DEST="${DEPLOY_PATH:-photovideo360}"
          ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEST'"
          rsync -az -e "ssh -i ~/.ssh/deploy_key -p ${DEPLOY_PORT:-22}" \
            docker-compose.prod.yml docker-compose.monitoring.yml .env.docker.example ops \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEST/"

      - name: Roll the stack
        if: steps.guard.outputs.configured == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_TAG: ${{ inputs.tag != '' && inputs.tag || github.sha }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH='${DEPLOY_PATH:-photovideo360}' GHCR_USER='$GHCR_USER' GHCR_TOKEN='$GHCR_TOKEN' IMAGE_TAG='$IMAGE_TAG' bash -s" \
            < ops/deploy/remote-deploy.sh
