# Deploy — on every push to master:
#   1. build the three images and push them to GHCR
#      (ghcr.io/<owner>/<repo>/{server,client,admin}, tagged :latest + :<sha>)
#      — kept for the future Docker migration; production does not run them yet.
#   2. deploy the pushed commit to the PM2/nginx VPS over SSH
#      (ops/deploy/remote-deploy-pm2.sh): upload a git archive, build on the
#      server beside the live tree, swap, pm2 restart — health-gated with
#      automatic rollback. When the VPS migrates to the Docker stack (OPS.md),
#      switch this job back to ops/deploy/remote-deploy.sh.
#
# Required repo secrets for step 2 (until they exist, images are still pushed
# and the deploy step is skipped with a warning):
#   DEPLOY_HOST      VPS IP / hostname
#   DEPLOY_USER      SSH user
#   DEPLOY_SSH_KEY   private key (openssh format) authorized on the VPS
# Optional:
#   DEPLOY_PORT      SSH port (default 22)

name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing image tag to deploy (skips build). Empty = build current commit."
        required: false
        default: ""

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-push:
    # Skipped when dispatching an existing tag (rollback).
    if: github.event_name == 'push' || inputs.tag == ''
    name: push ${{ matrix.name }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: server
            context: .
            dockerfile: server/Dockerfile
          - name: client
            context: client
            dockerfile: client/Dockerfile
          - name: admin
            context: admin
            dockerfile: admin/Dockerfile
    steps:
      - uses: actions/checkout@v4

      # GHCR requires lowercase image names; the GitHub owner is not lowercase.
      - name: Derive image prefix
        id: img
        run: echo "prefix=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.img.outputs.prefix }}/${{ matrix.name }}:latest
            ${{ steps.img.outputs.prefix }}/${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  deploy:
    # Independent of build-push: images are not used by the PM2 deploy path,
    # so a Docker-only build issue must not block shipping to production.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check deploy secrets
        id: guard
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          if [ -z "$DEPLOY_HOST" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::DEPLOY_HOST / DEPLOY_USER / DEPLOY_SSH_KEY secrets are not set — images were pushed to GHCR, server deploy skipped."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up SSH
        if: steps.guard.outputs.configured == 'true'
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload source archive
        if: steps.guard.outputs.configured == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          git archive --format=tar.gz -o /tmp/deploy.tar.gz HEAD
          scp -i ~/.ssh/deploy_key -P "${DEPLOY_PORT:-22}" \
            /tmp/deploy.tar.gz "$DEPLOY_USER@$DEPLOY_HOST:/tmp/deploy-${{ github.sha }}.tar.gz"

      - name: Build on the VPS, swap, health-check (auto-rollback)
        if: steps.guard.outputs.configured == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST" \
            "SHA='${{ github.sha }}' bash -s" \
            < ops/deploy/remote-deploy-pm2.sh
