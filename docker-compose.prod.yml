# Production stack — prebuilt images from GHCR, pushed by .github/workflows/deploy.yml.
# Lives on the VPS next to a hand-written .env (see .env.docker.example; JWT_SECRET
# is required). The CI deploy runs it as:
#
#   IMAGE_TAG=<git sha> docker compose -f docker-compose.prod.yml up -d
#
# Manual use on the VPS (deploys :latest):
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# Ports: client on ${CLIENT_PORT:-80}, admin on ${ADMIN_PORT:-8080} — matching the
# existing Contabo layout. The API is NOT published; browsers reach it through the
# client/admin same-origin proxies. Backups land in ./backups (see ops/backup).

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  server:
    image: ghcr.io/ahmed-mahmoud-tech/3dtour/server:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/photovideo360
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      MAX_IMAGE_SIZE: ${MAX_IMAGE_SIZE:-52428800}
      MAX_VIDEO_SIZE: ${MAX_VIDEO_SIZE:-524288000}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
    volumes:
      - uploads:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy

  client:
    image: ghcr.io/ahmed-mahmoud-tech/3dtour/client:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      SERVER_ORIGIN: http://server:5000
    ports:
      - "${CLIENT_PORT:-80}:5173"
    depends_on:
      - server

  admin:
    image: ghcr.io/ahmed-mahmoud-tech/3dtour/admin:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-8080}:80"
    depends_on:
      - server

  # Nightly mongodump + weekly uploads tar into ./backups, with retention.
  # Scripts: ops/backup/ — restore with:
  #   docker compose -f docker-compose.prod.yml run --rm backup bash /ops/restore.sh <archive>
  backup:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://mongo:27017/photovideo360
      BACKUP_HOUR_UTC: ${BACKUP_HOUR_UTC:-3}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      BACKUP_UPLOADS: ${BACKUP_UPLOADS:-1}
      UPLOADS_KEEP: ${UPLOADS_KEEP:-4}
    volumes:
      - ./ops/backup:/ops:ro
      - ./backups:/backups
      - uploads:/uploads
    entrypoint: ["bash", "/ops/backup-loop.sh"]
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo-data:
  uploads:
