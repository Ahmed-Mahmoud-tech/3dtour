# Full stack: MongoDB + API (with FFmpeg) + Next.js client + nginx-served admin.
#
#   cp .env.docker.example .env   # then set JWT_SECRET (and SMTP_* if wanted)
#   docker compose up -d --build
#
#   Client (landing / viewer / dashboard):  http://localhost:5173
#   Admin dashboard:                         http://localhost:5174
#   API (direct, optional):                  http://localhost:5000/api/health

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/photovideo360
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      # Browsers talk to the client/admin (which same-origin proxy to the API),
      # so CORS rarely triggers; list the public origins anyway.
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:5174}
      MAX_IMAGE_SIZE: ${MAX_IMAGE_SIZE:-52428800}
      MAX_VIDEO_SIZE: ${MAX_VIDEO_SIZE:-524288000}
      # FFmpeg is on PATH in the image — leave FFMPEG_PATH unset.
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
    volumes:
      - uploads:/app/uploads
    ports:
      - "5000:5000"   # optional direct API access; remove to keep it internal
    depends_on:
      mongo:
        condition: service_healthy

  client:
    build:
      context: ./client
    restart: unless-stopped
    environment:
      NODE_ENV: production
      SERVER_ORIGIN: http://server:5000   # next.config rewrites() proxy target
    ports:
      - "5173:5173"
    depends_on:
      - server

  admin:
    build:
      context: ./admin
    restart: unless-stopped
    ports:
      - "5174:80"
    depends_on:
      - server

volumes:
  mongo-data:
  uploads:
